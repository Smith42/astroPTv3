# AstroPT3 70M pilot pretraining (Pythia-mirrored size; recipe: 32 GPUs,
# TP=1, DP=32, ZeRO-1, no recompute — see astro/PLAN.md parallelism table).
#
#   cd <repo root> && CUDA_DEVICE_MAX_CONNECTIONS=1 \
#     torchrun --nnodes=... --nproc_per_node=8 nanotron/run_train.py \
#       --config-file astro/configs/nanotron/astropt3-70m.yaml
#
# GBS = dp(32) x mbs(16) x seq(4096) = 2.10M tokens/step.
# For a dry run on fewer GPUs, scale `parallelism.dp` down and
# `batch_accumulation_per_replica` up to keep GBS.
general:
  project: astropt3
  run: astropt3-70m-pilot
  seed: 42
  step: null
  consumed_train_samples: null
  benchmark_csv_path: null
  # must stay true: flattened modality tensors differ in shape across DP
  # ranks, which the DP input sanity check cannot handle
  ignore_sanity_checks: true
logging:
  iteration_step_info_interval: 1
  log_level: info
  log_level_replica: info
model:
  ddp_bucket_cap_mb: 25
  dtype: bfloat16
  init_method:
    std: 0.02
  make_vocab_size_divisible_by: 1
  model_config:
    is_astropt3_config: true
    # pinned pilot modalities (verified MMU schemas); written out explicitly
    # here for the record — these match the dataclass defaults
    modalities:
    - name: images
      input_size: 192
      patch_size: 8
      pos_type: index
      pos_input_size: 1
      max_positions: 361
      loss_weight: 1.0
    - name: spectra
      input_size: 256
      patch_size: 256
      pos_type: continuous
      pos_input_size: 1
      max_positions: 1024
      loss_weight: 1.0
    tokeniser: affine
    spiral: true  # center-outward image patch order (ADR 0004)
    huber_delta: 1.0
    hidden_size: 512
    num_hidden_layers: 23
    num_attention_heads: 8
    num_key_value_heads: 2
    intermediate_size: 1536
    max_position_embeddings: 4096
    rope_theta: 100000.0
    no_rope_layer: 4
    rms_norm_eps: 1.0e-06
    rope_interleaved: false
    hidden_act: silu
    attention_bias: false
    initializer_range: 0.02
    vocab_size: 64
    pad_token_id: 0
    bos_token_id: 1
    eos_token_id: 1
    tie_word_embeddings: false
    use_cache: false
    _attn_implementation: flash_attention_2
    _use_qkv_packed: true
    _use_doc_masking: true
    _fused_rms_norm: true
    _fused_rotary_emb: true
    log_attn_probs: false
parallelism:
  dp: 2
  pp: 1
  tp: 1
  context_parallel_size: 1
  expert_parallel_size: 1
  pp_engine: 1f1b
  tp_mode: ALL_REDUCE            # required: modality modules are TP-replicated
  tp_linear_async_communication: false
  recompute_layer: false
data_stages:
- name: pilot-stable
  start_training_step: 1
  data:
    dataset:
      # train split written by astro/scripts/prepare_pilot_data.py; path is
      # relative to the launch cwd (repo root) — point at scratch on the
      # training cluster if the corpus lives elsewhere
      data_root: ../astroPTv3_data/pilot_v1/train
      shuffle_buffer_size: 2000
    seed: 42
    num_loading_workers: 2
optimizer:
  accumulate_grad_in_fp32: true
  clip_grad: 1.0
  learning_rate_scheduler:
    learning_rate: 0.001         # Pythia 70M peak LR
    lr_warmup_steps: 2000        # min(2000, 1% of train_steps)
    lr_warmup_style: linear
    lr_decay_style: cosine       # cosine to 0.1x peak
    lr_decay_steps: null         # defaults to train_steps - warmup
    lr_decay_starting_step: null
    min_decay_lr: 0.0001
  optimizer_factory:
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    name: adamW
    torch_adam_is_fused: true
  weight_decay: 0.1              # on >=2D params; norms excluded below
  weight_decay_exclude_named_params:
  - .*layernorm.*
  - .*layer_norm.*
  zero_stage: 1
tokens:
  sequence_length: 4096
  train_steps: 10000             # placeholder ~21B tokens (~4 pilot epochs);
                                 # token budget finalized at launch (Phase 5)
  micro_batch_size: 16
  batch_accumulation_per_replica: 1
  val_check_interval: 100
  limit_val_batches: 0           # eval hooks arrive in Phase 4
  limit_test_batches: 0
checkpoints:
  checkpoints_path: ../astroPTv3_checkpoints/astropt3-70m
  checkpoint_interval: 1000      # Pythia log-spaced schedule lands in Phase 4
  save_initial_state: false
  save_final_state: true
tokenizer:
  tokenizer_name_or_path: null
profiler: null
