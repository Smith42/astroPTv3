# AstroPT3 6.9B pilot pretraining (Pythia-mirrored size; recipe: 128 GPUs,
# TP=4, DP=32, ZeRO-1 — see astro/PLAN.md parallelism table).
#
#   sbatch --nodes=16 astro/scripts/launch_slurm.sbatch \
#       astro/configs/nanotron/astropt3-6p9b.yaml
#
# GBS = dp(32) x mbs(4) x acc(4) x seq(4096) = 2.10M tokens/step.
# Dry-run 100 steps at the target topology first (see the sbatch header).
# For a smaller box, scale `parallelism.dp` down and
# `batch_accumulation_per_replica` up to keep GBS.
general:
  project: astropt3
  run: astropt3-6p9b-pilot
  seed: 42
  step: null
  consumed_train_samples: null
  benchmark_csv_path: null
  # must stay true: flattened modality tensors differ in shape across DP
  # ranks, which the DP input sanity check cannot handle
  ignore_sanity_checks: true
logging:
  iteration_step_info_interval: 1
  log_level: info
  log_level_replica: info
model:
  ddp_bucket_cap_mb: 25
  dtype: bfloat16
  init_method:
    std: 0.02
  make_vocab_size_divisible_by: 1
  model_config:
    is_astropt3_config: true
    # pinned pilot modalities (verified MMU schemas); written out explicitly
    # here for the record — these match the dataclass defaults
    modalities:
    - name: images
      input_size: 192
      patch_size: 8
      pos_type: index
      pos_input_size: 1
      max_positions: 361
      loss_weight: 1.0
    - name: spectra
      input_size: 256
      patch_size: 256
      pos_type: continuous
      pos_input_size: 1
      max_positions: 1024
      loss_weight: 1.0
    tokeniser: affine
    huber_delta: 1.0
    hidden_size: 4096
    num_hidden_layers: 38
    num_attention_heads: 32
    num_key_value_heads: 8
    intermediate_size: 11008
    max_position_embeddings: 4096
    rope_theta: 100000.0
    no_rope_layer: 4
    rms_norm_eps: 1.0e-06
    rope_interleaved: false
    hidden_act: silu
    attention_bias: false
    initializer_range: 0.02
    vocab_size: 64
    pad_token_id: 0
    bos_token_id: 1
    eos_token_id: 1
    tie_word_embeddings: false
    use_cache: false
    _attn_implementation: flash_attention_2
    _use_qkv_packed: true
    _use_doc_masking: true
    _fused_rms_norm: true
    _fused_rotary_emb: true
    log_attn_probs: false
parallelism:
  dp: 32
  pp: 1                          # PP=1 everywhere by design
  tp: 4                          # inside the NVLink node only
  context_parallel_size: 1
  expert_parallel_size: 1
  pp_engine: 1f1b
  tp_mode: ALL_REDUCE            # required: modality modules are TP-replicated
  tp_linear_async_communication: false
  recompute_layer: true
data_stages:
- name: pilot-stable
  start_training_step: 1
  data:
    dataset:
      # train split written by astro/scripts/prepare_pilot_data.py; path is
      # relative to the launch cwd (repo root) — point at scratch on the
      # training cluster if the corpus lives elsewhere
      data_root: ../astroPTv3_data/pilot_v1/train
      shuffle_buffer_size: 2000
    seed: 42
    # resume-exact with workers via torchdata's StatefulDataLoader; a resumed
    # run must use the SAME worker count as the run that saved the checkpoint
    num_loading_workers: 8
optimizer:
  accumulate_grad_in_fp32: true
  clip_grad: 1.0
  learning_rate_scheduler:
    learning_rate: 0.00012        # Pythia 6.9B peak LR
    lr_warmup_steps: 2000        # min(2000, 1% of train_steps)
    lr_warmup_style: linear
    lr_decay_style: cosine       # cosine to 0.1x peak
    lr_decay_steps: null         # defaults to train_steps - warmup
    lr_decay_starting_step: null
    min_decay_lr: 0.000012
  optimizer_factory:
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    name: adamW
    torch_adam_is_fused: true
  weight_decay: 0.1              # on >=2D params; norms excluded below
  weight_decay_exclude_named_params:
  - .*layernorm.*
  - .*layer_norm.*
  zero_stage: 1
tokens:
  sequence_length: 4096
  train_steps: 10000             # placeholder ~21B tokens (~4 pilot epochs);
                                 # token budget finalized at launch (Phase 5)
  micro_batch_size: 4
  batch_accumulation_per_replica: 4
  val_check_interval: 100
  limit_val_batches: 0           # eval never runs in the trainer: use
  limit_test_batches: 0          # scripts/run_probe_sweep.py on a spare GPU
checkpoints:
  checkpoints_path: ../astroPTv3_checkpoints/astropt3-6p9b
  checkpoint_schedule: pythia    # steps 1,2,4,...,512 + every interval
  checkpoint_interval: 1000
  save_initial_state: false
  save_final_state: true
tokenizer:
  tokenizer_name_or_path: null
profiler: null
