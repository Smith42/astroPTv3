# clip_grad sweep point 1: identical to astropt3-70m-jetformer-pilotv2-specnorm
# except clip_grad 1.0 -> 100.0. The specnorm run's grad_norm sat at
# 0.6-2.2K against clip 1.0 the whole 20k steps — every update rescaled
# ~1000x, so the effective LR was ~1e-6 and the cosine schedule decorative.
# This point lets the natural nats-scale gradient through and clips only
# true spikes. Watch: loss trajectories vs specnorm (val −107 @20k), GMM
# variance calibration (T=1 sample texture), and stability (divergence =
# a finding, not a failure).
general:
  project: astropt3
  run: astropt3-70m-jetformer-pilotv2-specnorm-clip100
  seed: 42
  step: null
  consumed_train_samples: null
  benchmark_csv_path: null
  ignore_sanity_checks: true
logging:
  iteration_step_info_interval: 1
  log_level: info
  log_level_replica: info
model:
  ddp_bucket_cap_mb: 25
  dtype: bfloat16
  init_method:
    std: 0.02
  make_vocab_size_divisible_by: 1
  model_config:
    is_astropt3_config: true
    modalities:
    - name: images
      input_size: 192
      patch_size: 8
      pos_type: index
      pos_input_size: 1
      max_positions: 361
      loss_weight: 1.0
    - name: spectra
      input_size: 256
      patch_size: 256
      pos_type: continuous
      pos_input_size: 1
      max_positions: 1024
      loss_weight: 1.0
    tokeniser: jetformer
    jetformer_flow_steps: 4
    jetformer_flow_hidden: 128
    jetformer_gmm_k: 4
    jetformer_noise_max: 0.1
    jetformer_noise_min: 0.0
    spectra_norm_divisor: 10.0  # ADR 0007 arcsinh knee (nMgy)
    huber_delta: 1.0
    hidden_size: 512
    num_hidden_layers: 23
    num_attention_heads: 8
    num_key_value_heads: 2
    intermediate_size: 1536
    max_position_embeddings: 4096
    rope_theta: 100000.0
    no_rope_layer: 4
    rms_norm_eps: 1.0e-06
    rope_interleaved: false
    hidden_act: silu
    attention_bias: false
    initializer_range: 0.02
    vocab_size: 64
    pad_token_id: 0
    bos_token_id: 1
    eos_token_id: 1
    tie_word_embeddings: false
    use_cache: false
    _attn_implementation: flash_attention_2
    _use_qkv_packed: true
    _use_doc_masking: true
    _fused_rms_norm: true
    _fused_rotary_emb: true
    log_attn_probs: false
parallelism:
  dp: 2
  pp: 1
  tp: 1
  context_parallel_size: 1
  expert_parallel_size: 1
  pp_engine: 1f1b
  tp_mode: ALL_REDUCE
  tp_linear_async_communication: false
  recompute_layer: false
data_stages:
- name: jetformer-test
  start_training_step: 1
  data:
    dataset:
      data_root: /work/nvme/bfvh/msmith10/astroPTv3_data/pilot_v2/train
      spectra_oversample: 2  # set from real corpus counts before launch
      shuffle_buffer_size: 2000
      object_id_log: /work/nvme/bfvh/msmith10/astroPTv3_checkpoints/astropt3-70m-jetformer-pilotv2-specnorm-clip100/objects.log
    seed: 42
    # 8 workers/rank needs the whole 68.7G slurm memory cgroup to itself:
    # co-launching the eval sidecar on top OOM-killed a worker at step 2168
    # (16 x ~3.8G RSS + 2 ranks + sidecar), and 4 workers starved the feed
    # (~80K vs 115K tok/s/GPU). Run the probe sweep post-hoc instead of via
    # EVAL_GPU while the cgroup budget is this tight.
    num_loading_workers: 8
optimizer:
  accumulate_grad_in_fp32: true
  clip_grad: 100.0
  learning_rate_scheduler:
    learning_rate: 0.001
    lr_warmup_steps: 200
    lr_warmup_style: linear
    lr_decay_style: cosine
    lr_decay_steps: null
    lr_decay_starting_step: null
    min_decay_lr: 0.0001
  optimizer_factory:
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    name: adamW
    torch_adam_is_fused: true
  weight_decay: 0.1
  weight_decay_exclude_named_params:
  - .*layernorm.*
  - .*layer_norm.*
  zero_stage: 1
tokens:
  sequence_length: 4096
  train_steps: 20000
  micro_batch_size: 16
  batch_accumulation_per_replica: 1
  val_check_interval: 100
  limit_val_batches: 0
  limit_test_batches: 0
checkpoints:
  checkpoints_path: /work/nvme/bfvh/msmith10/astroPTv3_checkpoints/astropt3-70m-jetformer-pilotv2-specnorm-clip100
  # resume from latest.txt when present (nanotron never auto-derives this);
  # workers>0 -> no dataset_state, so a resume re-draws the stream fresh
  resume_checkpoint_path: /work/nvme/bfvh/msmith10/astroPTv3_checkpoints/astropt3-70m-jetformer-pilotv2-specnorm-clip100
  checkpoint_interval: 1000
  save_initial_state: false
  save_final_state: true
  checkpoint_schedule: pythia
tokenizer:
  tokenizer_name_or_path: null
profiler: null
