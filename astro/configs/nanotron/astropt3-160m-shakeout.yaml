# 160M REAL-DATA run on the dev node (2xA100, DP=2, ZeRO-1), sized to be
# directly comparable with the 70M reference run (astropt3-70m-shakeout.yaml):
# same 20000-step / 2.62B-token budget and recipe at the 160M size, LR
# scaled 1e-3 -> 6e-4 per the size table. Latest mix (shakeout_mix2 =
# pilot_v1 images + SV3-cone spectra). GBS = 2 x 16 x 4096 = 131k tok/step.
checkpoints:
  checkpoint_interval: 1000
  checkpoint_schedule: pythia
  checkpoints_path: ../astroPTv3_checkpoints/astropt3-160m-real-shakeout
  resume_checkpoint_path: ../astroPTv3_checkpoints/astropt3-160m-real-shakeout
  save_final_state: true
  save_initial_state: false
data_stages:
- data:
    dataset:
      data_root: /beegfs/general/mjsmith/foundation/astroPT_all/astroPTv3_data/shakeout_mix2/train
      shuffle_buffer_size: 2000
    num_loading_workers: 8
    seed: 42
  name: real-shakeout
  start_training_step: 1
general:
  benchmark_csv_path: null
  consumed_train_samples: null
  ignore_sanity_checks: true
  project: astropt3
  run: astropt3-160m-real-shakeout
  seed: 42
  step: null
logging:
  iteration_step_info_interval: 1
  log_level: info
  log_level_replica: info
model:
  ddp_bucket_cap_mb: 25
  dtype: bfloat16
  init_method:
    std: 0.02
  make_vocab_size_divisible_by: 1
  model_config:
    _attn_implementation: flash_attention_2
    _fused_rms_norm: true
    _fused_rotary_emb: true
    _use_doc_masking: true
    _use_qkv_packed: true
    attention_bias: false
    bos_token_id: 1
    eos_token_id: 1
    hidden_act: silu
    hidden_size: 768
    huber_delta: 1.0
    initializer_range: 0.02
    intermediate_size: 2048
    is_astropt3_config: true
    log_attn_probs: false
    max_position_embeddings: 4096
    modalities:
    - input_size: 192
      loss_weight: 1.0
      max_positions: 361
      name: images
      patch_size: 8
      pos_input_size: 1
      pos_type: index
    - input_size: 256
      loss_weight: 1.0
      max_positions: 1024
      name: spectra
      patch_size: 256
      pos_input_size: 1
      pos_type: continuous
    no_rope_layer: 4
    num_attention_heads: 12
    num_hidden_layers: 25
    num_key_value_heads: 4
    pad_token_id: 0
    rms_norm_eps: 1.0e-06
    rope_interleaved: false
    rope_theta: 100000.0
    tie_word_embeddings: false
    tokeniser: affine
    use_cache: false
    vocab_size: 64
optimizer:
  accumulate_grad_in_fp32: true
  clip_grad: 1.0
  learning_rate_scheduler:
    learning_rate: 0.0006
    lr_decay_starting_step: null
    lr_decay_steps: null
    lr_decay_style: cosine
    lr_warmup_steps: 200
    lr_warmup_style: linear
    min_decay_lr: 0.0001
  optimizer_factory:
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    name: adamW
    torch_adam_is_fused: true
  weight_decay: 0.1
  weight_decay_exclude_named_params:
  - .*layernorm.*
  - .*layer_norm.*
  zero_stage: 1
parallelism:
  context_parallel_size: 1
  dp: 2
  expert_parallel_size: 1
  pp: 1
  pp_engine: 1f1b
  recompute_layer: false
  tp: 1
  tp_linear_async_communication: false
  tp_mode: ALL_REDUCE
profiler: null
tokenizer:
  tokenizer_name_or_path: null
tokens:
  batch_accumulation_per_replica: 1
  limit_test_batches: 0
  limit_val_batches: 0
  micro_batch_size: 16
  sequence_length: 4096
  train_steps: 20000
  val_check_interval: 100
