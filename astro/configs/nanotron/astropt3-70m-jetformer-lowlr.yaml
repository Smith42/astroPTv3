# 70M JETFORMER shakeout on shakeout_mix2, single GPU (dp:1, ZeRO-1), 10x lower LR.
# Identical to astropt3-70m-jetformer.yaml except: (a) peak LR scaled 1e-3 ->
# 1e-4 (and floor 1e-4 -> 1e-5) as an LR-sensitivity probe on the nats-scale
# NLL_GMM(z) - logdet loss, (b) single GH200 with batch_accumulation 2 so GBS
# stays 1 x 16 x 2 x 4096 = 131k tok/step, matching the dp:2 reference runs.
# Loss is exact patch-space likelihood - negative values are correct; watch
# grad norms early.
general:
  project: astropt3
  run: astropt3-70m-jetformer-lowlr
  seed: 42
  step: null
  consumed_train_samples: null
  benchmark_csv_path: null
  ignore_sanity_checks: true
logging:
  iteration_step_info_interval: 1
  log_level: info
  log_level_replica: info
model:
  ddp_bucket_cap_mb: 25
  dtype: bfloat16
  init_method:
    std: 0.02
  make_vocab_size_divisible_by: 1
  model_config:
    is_astropt3_config: true
    modalities:
    - name: images
      input_size: 192
      patch_size: 8
      pos_type: index
      pos_input_size: 1
      max_positions: 361
      loss_weight: 1.0
    - name: spectra
      input_size: 256
      patch_size: 256
      pos_type: continuous
      pos_input_size: 1
      max_positions: 1024
      loss_weight: 1.0
    tokeniser: jetformer
    spiral: true  # center-outward image patch order (ADR 0004)
    jetformer_flow_steps: 4
    jetformer_flow_hidden: 128
    jetformer_gmm_k: 4
    jetformer_noise_max: 0.1
    jetformer_noise_min: 0.0
    huber_delta: 1.0
    hidden_size: 512
    num_hidden_layers: 23
    num_attention_heads: 8
    num_key_value_heads: 2
    intermediate_size: 1536
    max_position_embeddings: 4096
    rope_theta: 100000.0
    no_rope_layer: 4
    rms_norm_eps: 1.0e-06
    rope_interleaved: false
    hidden_act: silu
    attention_bias: false
    initializer_range: 0.02
    vocab_size: 64
    pad_token_id: 0
    bos_token_id: 1
    eos_token_id: 1
    tie_word_embeddings: false
    use_cache: false
    _attn_implementation: flash_attention_2
    _use_qkv_packed: true
    _use_doc_masking: true
    _fused_rms_norm: true
    _fused_rotary_emb: true
    log_attn_probs: false
parallelism:
  dp: 1
  pp: 1
  tp: 1
  context_parallel_size: 1
  expert_parallel_size: 1
  pp_engine: 1f1b
  tp_mode: ALL_REDUCE
  tp_linear_async_communication: false
  recompute_layer: false
data_stages:
- name: jetformer-lowlr
  start_training_step: 1
  data:
    dataset:
      data_root: mmu
      object_id_log: /work/nvme/bfvh/msmith10/astroPTv3_checkpoints/astropt3-70m-jetformer-lowlr/objects.log
    seed: 42
    num_loading_workers: 8
optimizer:
  accumulate_grad_in_fp32: true
  clip_grad: 1.0
  learning_rate_scheduler:
    learning_rate: 0.0001         # 10x lower than the 1e-3 baseline peak
    lr_warmup_steps: 200
    lr_warmup_style: linear
    lr_decay_style: cosine
    lr_decay_steps: null
    lr_decay_starting_step: null
    min_decay_lr: 1.0e-05         # floor scaled 10x too, to keep schedule shape
  optimizer_factory:
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    name: adamW
    torch_adam_is_fused: true
  weight_decay: 0.1
  weight_decay_exclude_named_params:
  - .*layernorm.*
  - .*layer_norm.*
  zero_stage: 1
tokens:
  sequence_length: 4096
  train_steps: 20000
  micro_batch_size: 16
  batch_accumulation_per_replica: 2   # dp:1 x mbs:16 x accum:2 = same 131k-tok GBS as the dp:2 runs
  val_check_interval: 100
  limit_val_batches: 0
  limit_test_batches: 0
checkpoints:
  checkpoints_path: /work/nvme/bfvh/msmith10/astroPTv3_checkpoints/astropt3-70m-jetformer-lowlr
  checkpoint_interval: 1000
  save_initial_state: false
  save_final_state: true
  checkpoint_schedule: pythia
tokenizer:
  tokenizer_name_or_path: null
profiler: null
