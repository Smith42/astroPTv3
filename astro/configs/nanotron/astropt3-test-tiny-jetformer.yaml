# Tiny AstroPT3 nanotron config, jetformer tokeniser: 50-step synthetic
# smoke run on 1 GPU. Identical to astropt3-test-tiny.yaml except the
# tokeniser block — loss is the exact patch-space likelihood
# NLL_GMM(z) - logdet (negative values are correct), with the flow-noise
# curriculum annealed 0.1 -> 0 over the run by the trainer.
#
#   cd <repo root> && CUDA_DEVICE_MAX_CONNECTIONS=1 \
#     torchrun --nproc_per_node=1 nanotron/run_train.py \
#       --config-file astro/configs/nanotron/astropt3-test-tiny-jetformer.yaml
general:
  project: astropt3
  run: test-tiny-jetformer
  seed: 42
  step: null
  consumed_train_samples: null
  benchmark_csv_path: null
  ignore_sanity_checks: true
logging:
  iteration_step_info_interval: 1
  log_level: info
  log_level_replica: info
model:
  ddp_bucket_cap_mb: 25
  dtype: bfloat16
  init_method:
    std: 0.02
  make_vocab_size_divisible_by: 1
  model_config:
    is_astropt3_config: true
    tokeniser: jetformer
    jetformer_flow_steps: 4
    jetformer_flow_hidden: 128
    jetformer_gmm_k: 4
    jetformer_noise_max: 0.1
    jetformer_noise_min: 0.0
    huber_delta: 1.0
    hidden_size: 64
    num_hidden_layers: 4
    num_attention_heads: 4
    num_key_value_heads: 2
    intermediate_size: 128
    max_position_embeddings: 4096
    rope_theta: 100000.0
    no_rope_layer: 4
    rms_norm_eps: 1.0e-06
    rope_interleaved: false
    hidden_act: silu
    attention_bias: false
    initializer_range: 0.02
    vocab_size: 64
    pad_token_id: 0
    bos_token_id: 1
    eos_token_id: 1
    tie_word_embeddings: false
    use_cache: false
    _attn_implementation: flash_attention_2
    _use_qkv_packed: true
    _use_doc_masking: true
    _fused_rms_norm: false
    _fused_rotary_emb: false
    log_attn_probs: false
parallelism:
  dp: 1
  pp: 1
  tp: 1
  context_parallel_size: 1
  expert_parallel_size: 1
  pp_engine: 1f1b
  tp_mode: ALL_REDUCE            # required: modality modules are TP-replicated
  tp_linear_async_communication: false
  recompute_layer: false
data_stages:
- name: synthetic-smoke
  start_training_step: 1
  data:
    dataset:
      data_root: synthetic       # offline synthetic MMU-schema records
      synthetic_image_only_fraction: 0.3
    seed: 42
    num_loading_workers: 0
optimizer:
  accumulate_grad_in_fp32: true
  clip_grad: 1.0
  learning_rate_scheduler:
    learning_rate: 0.001
    lr_warmup_steps: 10
    lr_warmup_style: linear
    lr_decay_style: cosine
    lr_decay_steps: 40
    lr_decay_starting_step: null
    min_decay_lr: 0.0001
  optimizer_factory:
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    name: adamW
    torch_adam_is_fused: true
  weight_decay: 0.1
  weight_decay_exclude_named_params:
  - .*layernorm.*
  - .*layer_norm.*
  zero_stage: 0
tokens:
  sequence_length: 896
  train_steps: 50
  micro_batch_size: 4
  batch_accumulation_per_replica: 1
  val_check_interval: 100
  limit_val_batches: 0
  limit_test_batches: 0
checkpoints:
  checkpoints_path: ../astroPTv3_checkpoints/test-tiny-jetformer
  checkpoint_interval: 50
  save_initial_state: false
  save_final_state: true
tokenizer:
  tokenizer_name_or_path: null
profiler: null
