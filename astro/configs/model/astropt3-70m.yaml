# AstroPT3 70m — Pythia-mirrored size, SmolLM3 architecture (GQA, NoPE/4)
name: astropt3-70m
nominal_params: 70000000
hidden_size: 512
num_hidden_layers: 23
num_attention_heads: 8
num_key_value_heads: 2
intermediate_size: 1536
max_position_embeddings: 4096
rope_theta: 100000.0
no_rope_layer_interval: 4
tokeniser: affine
spiral: true  # center-outward image patch order (ADR 0004)
