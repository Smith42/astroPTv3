# AstroPT3 160m — Pythia-mirrored size, SmolLM3 architecture (GQA, NoPE/4)
name: astropt3-160m
nominal_params: 160000000
hidden_size: 768
num_hidden_layers: 25
num_attention_heads: 12
num_key_value_heads: 4
intermediate_size: 2048
max_position_embeddings: 4096
rope_theta: 100000.0
no_rope_layer_interval: 4
tokeniser: affine
spiral: true  # center-outward image patch order (ADR 0004)
